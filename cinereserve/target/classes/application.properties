# CineReserve – Spring Boot Configuration
# SE1020 OOP Project – Group 135, Sub Group 07.02

# Server port
server.port=8080

# Application name
spring.application.name=CineReserve

# Static resources (serves index.html from src/main/resources/static/)
spring.web.resources.static-locations=classpath:/static/

# Disable template engine (we use plain HTML + REST API)
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# Logging level
logging.level.root=INFO
logging.level.lk.sliit.cinereserve=DEBUG
